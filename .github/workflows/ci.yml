name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest

  package:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build distributions
        run: python -m build

      - name: Check distribution metadata
        run: python -m twine check dist/*

      - name: Smoke install wheel
        run: |
          python -m venv .wheel-smoke
          . .wheel-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          python - <<'PY'
          import numpy as np

          from stark import Frame, Interval, Method, System
          from stark.engines import AcceleratorNone, EngineNumpy
          from stark.methods import SchemeCashKarp

          def dynamics(t, state, out):
              del t
              out.dy[0] = -0.5 * state.y[0]

          system = System(
              dynamics=dynamics,
              frame=Frame.scalar("y", translation="dy"),
          )
          ivp = system.ivp(
              initial={"y": np.array([2.0])},
              interval=Interval(present=0.0, step=0.1, stop=0.2),
              method=Method(SchemeCashKarp),
              engine=lambda frame: EngineNumpy(
                  frame,
                  accelerator=AcceleratorNone(),
              ),
          )
          result = ivp.final_result()
          assert result.interval.present == 0.2
          PY
